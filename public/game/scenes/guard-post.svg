<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Guard shift log post</title>
  <desc id="desc">A security guard post with shift monitors, access gates, fingerprint markers, and night watch lighting.</desc>
  <defs>
    <radialGradient id="night" cx="50%" cy="38%" r="72%">
      <stop offset="0" stop-color="#1c4c55"/>
      <stop offset=".5" stop-color="#061d2d"/>
      <stop offset="1" stop-color="#020711"/>
    </radialGradient>
    <linearGradient id="booth" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#17384a"/>
      <stop offset=".56" stop-color="#0a1d30"/>
      <stop offset="1" stop-color="#050d18"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="20" flood-color="#000611" flood-opacity=".58"/>
    </filter>
    <pattern id="scan" width="54" height="54" patternUnits="userSpaceOnUse">
      <path d="M54 0H0v54" fill="none" stroke="#70eee6" stroke-opacity=".06" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1600" height="900" fill="url(#night)"/>
