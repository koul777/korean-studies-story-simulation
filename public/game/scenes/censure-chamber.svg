    <path d="M380 598h840l36 70H344Z" fill="#071423" opacity=".82"/>
    <rect x="666" y="496" width="268" height="144" rx="10" fill="#fff6d9" transform="rotate(1 800 568)"/>
    <rect x="698" y="528" width="204" height="12" rx="6" fill="#071423" opacity=".78"/>
    <rect x="698" y="562" width="164" height="9" rx="4" fill="#071423" opacity=".48"/>
    <rect x="698" y="592" width="194" height="9" rx="4" fill="#071423" opacity=".48"/>
    <circle cx="891" cy="606" r="34" fill="none" stroke="#ff715f" stroke-opacity=".72" stroke-width="6"/>
    <path d="M868 606h46" stroke="#ff715f" stroke-opacity=".72" stroke-width="7" stroke-linecap="round"/>
  </g>

