<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Censure chamber</title>
  <desc id="desc">A cold procedural review chamber with red warning seals, rule books, audit rails, and a central censure file.</desc>
  <defs>
    <radialGradient id="coldRoom" cx="50%" cy="38%" r="70%">
      <stop offset="0" stop-color="#2a3347"/>
      <stop offset=".48" stop-color="#0a182a"/>
      <stop offset="1" stop-color="#020711"/>
    </radialGradient>
    <linearGradient id="steel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#1c3148"/>
      <stop offset=".55" stop-color="#0a1a2c"/>
      <stop offset="1" stop-color="#050b15"/>
    </linearGradient>
    <filter id="hardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="18" flood-color="#000611" flood-opacity=".62"/>
    </filter>
    <pattern id="scan" width="58" height="58" patternUnits="userSpaceOnUse">
      <path d="M58 0H0v58" fill="none" stroke="#ff715f" stroke-opacity=".06" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1600" height="900" fill="url(#coldRoom)"/>
  <rect width="1600" height="900" fill="url(#scan)" opacity=".92"/>
  <path d="M0 630h1600v270H0Z" fill="#020814"/>
  <path d="M160 124h1280v510H160Z" fill="#030a16" opacity=".4"/>

