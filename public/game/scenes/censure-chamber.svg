    <path d="M442 246h294M442 298h218M442 350h312M442 402h256M864 246h254M864 298h194M864 350h284M864 402h224" stroke="#b9eaff" stroke-opacity=".2" stroke-width="8" stroke-linecap="round"/>
    <circle cx="800" cy="349" r="88" fill="none" stroke="#ff715f" stroke-opacity=".66" stroke-width="7"/>
    <path d="M747 349h106M800 296v106" stroke="#ff715f" stroke-opacity=".7" stroke-width="10" stroke-linecap="round"/>
  </g>

