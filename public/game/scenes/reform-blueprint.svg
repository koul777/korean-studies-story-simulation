<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Reform blueprint studio</title>
  <desc id="desc">A bright reform planning studio with process maps, blueprint tables, sticky notes, and future prevention routes.</desc>
  <defs>
    <radialGradient id="studio" cx="50%" cy="38%" r="72%">
      <stop offset="0" stop-color="#235c72"/>
      <stop offset=".5" stop-color="#092436"/>
      <stop offset="1" stop-color="#020811"/>
    </radialGradient>
    <linearGradient id="blueprint" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0e4b68"/>
      <stop offset=".52" stop-color="#0b304c"/>
      <stop offset="1" stop-color="#071728"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
