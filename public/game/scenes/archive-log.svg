<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Archive log vault</title>
  <desc id="desc">A layered archive vault with old records, timestamp cards, and blue monitor light for log reconstruction scenes.</desc>
  <defs>
    <radialGradient id="vault" cx="50%" cy="38%" r="72%">
      <stop offset="0" stop-color="#1b4960"/>
      <stop offset=".52" stop-color="#071d31"/>
      <stop offset="1" stop-color="#020711"/>
    </radialGradient>
    <linearGradient id="shelf" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#17324a"/>
      <stop offset=".56" stop-color="#0a1d30"/>
      <stop offset="1" stop-color="#050d18"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#000611" flood-opacity=".55"/>
    </filter>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0v42" fill="none" stroke="#70eee6" stroke-opacity=".07" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1600" height="900" fill="url(#vault)"/>
  <rect width="1600" height="900" fill="url(#grid)" opacity=".8"/>
  <path d="M0 635h1600v265H0Z" fill="#020814"/>
  <g filter="url(#shadow)">
    <rect x="210" y="130" width="1180" height="510" rx="18" fill="url(#shelf)" stroke="#b9eaff" stroke-opacity=".18" stroke-width="2"/>
    <path d="M270 230h1060M270 344h1060M270 458h1060M270 572h1060" stroke="#f0d06b" stroke-opacity=".18" stroke-width="5"/>
    <g fill="#fff6d9" opacity=".78">
      <rect x="318" y="174" width="74" height="86" rx="5"/>
      <rect x="414" y="174" width="52" height="86" rx="5"/>
      <rect x="496" y="174" width="92" height="86" rx="5"/>
      <rect x="884" y="288" width="74" height="86" rx="5"/>
      <rect x="986" y="288" width="96" height="86" rx="5"/>
      <rect x="520" y="402" width="78" height="86" rx="5"/>
      <rect x="630" y="402" width="106" height="86" rx="5"/>
      <rect x="1034" y="516" width="92" height="86" rx="5"/>
      <rect x="1158" y="516" width="62" height="86" rx="5"/>
    </g>
    <g fill="#70eee6" opacity=".65">
      <rect x="648" y="188" width="256" height="12" rx="6"/>
      <rect x="648" y="224" width="190" height="9" rx="4"/>
      <rect x="330" y="316" width="280" height="12" rx="6"/>
      <rect x="330" y="352" width="208" height="9" rx="4"/>
      <rect x="836" y="430" width="306" height="12" rx="6"/>
      <rect x="836" y="466" width="214" height="9" rx="4"/>
    </g>
  </g>
  <g filter="url(#shadow)">
    <rect x="546" y="626" width="508" height="120" rx="14" fill="#061827" stroke="#70eee6" stroke-opacity=".22"/>
    <path d="M598 668h404M598 704h276" stroke="#d5f6f0" stroke-opacity=".36" stroke-width="10" stroke-linecap="round"/>
    <circle cx="1032" cy="688" r="34" fill="none" stroke="#f0d06b" stroke-opacity=".52" stroke-width="4"/>
  </g>
  <path d="M0 0h1600v900H0Z" fill="#000" opacity=".12"/>
</svg>
