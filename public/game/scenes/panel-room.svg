<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Final hearing panel room</title>
  <desc id="desc">A formal hearing chamber with a raised panel desk, witness table, projected evidence, and focused light.</desc>
  <defs>
    <radialGradient id="chamber" cx="50%" cy="36%" r="70%">
      <stop offset="0" stop-color="#234a63"/>
      <stop offset=".52" stop-color="#081b31"/>
      <stop offset="1" stop-color="#020711"/>
    </radialGradient>
    <linearGradient id="desk" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#1d3f58"/>
      <stop offset=".56" stop-color="#0d2239"/>
      <stop offset="1" stop-color="#050d19"/>
    </linearGradient>
    <linearGradient id="goldEdge" x1="0" x2="1">
      <stop offset="0" stop-color="#f0d06b" stop-opacity=".1"/>
      <stop offset=".5" stop-color="#fff1ac" stop-opacity=".9"/>
      <stop offset="1" stop-color="#f0d06b" stop-opacity=".1"/>
    </linearGradient>
    <filter id="panelShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="22" flood-color="#000611" flood-opacity=".58"/>
    </filter>
    <pattern id="floorGrid" width="68" height="68" patternUnits="userSpaceOnUse">
      <path d="M68 0H0v68" fill="none" stroke="#b9eaff" stroke-opacity=".055" stroke-width="1"/>
    </pattern>
  </defs>

