<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Recovery reconciliation desk</title>
  <desc id="desc">A quiet mediation desk with paired chairs, recovery documents, witness notes, and warm restorative lighting.</desc>
  <defs>
    <radialGradient id="warmRoom" cx="50%" cy="38%" r="72%">
